<button type="button" class="clickArea"
    (click)="fileInput.click()"
    (dragover)="onDragOver($event)" 
    (drop)="onDrop($event)" 
    (mouseenter)="focusClickArea($event,true)" 
    (mouseleave)="focusClickArea($event,false)" 
    (paste)="onPaste($event)"
>
    <img src="assets/Upload.svg" alt="Upload" draggable="false"/>
    @if(hasLabel())
    {
        <span>DROP FILE OR CLICK HERE</span>
    }
</button>
<input #fileInput 
    type="file" 
    (change)="onSelected($event)"
    [accept]="validTypes.join(',')"
    hidden>
